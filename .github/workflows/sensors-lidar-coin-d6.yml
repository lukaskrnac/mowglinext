name: Sensors — LiDAR Coin-D6

on:
  push:
    branches: [main, dev, 'feat/**', 'fix/**', 'refactor/**', 'chore/**', 'perf/**']
    paths:
      - 'sensors/lidar-coin-d6/**'
      - '.github/workflows/sensors-lidar-coin-d6.yml'
      - '.github/workflows/_sensor-docker.yml'
  workflow_dispatch:
    inputs:
      no-cache:
        description: 'Build without Docker layer cache'
        type: boolean
        default: false

concurrency:
  group: sensors-lidar-coin-d6-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/_sensor-docker.yml
    with:
      image: lidar-coin-d6
      context: ./sensors/lidar-coin-d6
      target: runtime
      no-cache: ${{ inputs.no-cache == true }}
