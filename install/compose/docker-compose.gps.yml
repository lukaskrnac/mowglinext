  # -------------------------------------------------------------------------
  # Canonical direct-GNSS sidecar.
  #
  # PR 2 runtime flip:
  #   GNSS_STACK=universal now means the existing mowgli-gps sidecar owns
  #   Universal GNSS and publishes the shared external contract:
  #     /gps/fix
  #     /gps/status
  #     /diagnostics
  #     /rtcm
  #
  # Transitional compatibility:
  #   the same container can still run the legacy compat path when
  #   GPS_RUNTIME_MODE=compat. The installer derives GPS_RUNTIME_MODE from
  #   GNSS_STACK so users only choose the stack once.
  # -------------------------------------------------------------------------
x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"
  # Use the bundled cyclonedds.xml so MaxAutoParticipantIndex=500 takes
  # effect — without it cyclone caps at 9 per host and the
  # gps_health_aggregator side-process fails with "Failed to find a
  # free participant index".
  CYCLONEDDS_URI: file:///cyclonedds.xml

services:

  gps:
    container_name: mowgli-gps
    image: ${GPS_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
      HARDWARE_BACKEND: ${HARDWARE_BACKEND}
      GNSS_STACK: ${GNSS_STACK:-universal}
      GPS_RUNTIME_MODE: ${GPS_RUNTIME_MODE:-compat}
      GNSS_RECEIVER_FAMILY: ${GNSS_RECEIVER_FAMILY:-auto}
      GNSS_TRANSPORT: ${GNSS_TRANSPORT:-serial}
      GNSS_SERIAL_DEVICE: ${GNSS_SERIAL_DEVICE:-/dev/gps}
      GNSS_SERIAL_BAUD: ${GNSS_SERIAL_BAUD:-921600}
      GNSS_NTRIP_ENABLED: ${GNSS_NTRIP_ENABLED:-false}
      GNSS_NTRIP_HOST: ${GNSS_NTRIP_HOST:-}
      GNSS_NTRIP_PORT: ${GNSS_NTRIP_PORT:-2101}
      GNSS_NTRIP_MOUNTPOINT: ${GNSS_NTRIP_MOUNTPOINT:-}
      GNSS_NTRIP_USERNAME: ${GNSS_NTRIP_USERNAME:-}
      GNSS_NTRIP_PASSWORD: ${GNSS_NTRIP_PASSWORD:-}
      # Transitional compat env passthrough. start_gps.sh still uses these
      # when GPS_RUNTIME_MODE=compat and as fallbacks for older installs.
      GPS_DEVICE_PATH: ${GNSS_SERIAL_DEVICE:-${GPS_PORT:-${UBLOX_DEVICE_SERIAL_STRING:-/dev/gps}}}
      GPS_PORT: ${GPS_PORT:-${UBLOX_DEVICE_SERIAL_STRING:-/dev/gps}}
      GPS_BY_ID: ${GPS_BY_ID:-}
      GPS_PROTOCOL: ${GPS_PROTOCOL:-UBX}
      GPS_BAUD: ${GPS_BAUD:-921600}
    volumes:
      - /dev:/dev
      - ./docker/config/mowgli:/config:ro
      - ./docker/config/cyclonedds.xml:/cyclonedds.xml:ro

    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
