# compose/docker-compose.lidar-coin-d6.yml
# WitMotion Coin-D6 (cspc_lidar / Guoke COIN dTOF core) — publishes /scan (LaserScan)

x-ros2-env: &ros2-env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
  RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
  ROS_AUTOMATIC_DISCOVERY_RANGE: LOCALHOST
  RCUTILS_COLORIZED_OUTPUT: "1"
  RCUTILS_LOGGING_USE_STDOUT: "1"

services:
  lidar:
    container_name: mowgli-lidar
    image: ${LIDAR_IMAGE}
    network_mode: host
    ipc: host
    privileged: true
    environment:
      <<: *ros2-env
    command: >
      ros2 run cspc_lidar cspc_lidar
      --ros-args
      -p port:=${LIDAR_PORT:-/dev/lidar}
      -p baudrate:=${LIDAR_BAUD:-230400}
      -p frame_id:=lidar_link
      -p version:=4
    volumes:
      - /dev:/dev
      - ./docker/config/cyclonedds.xml:/cyclonedds.xml:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 5m
